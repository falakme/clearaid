# ClarityAI — Coolify-compatible stack
# Runs the Next.js frontend and the FastAPI backend. ClarityAI is stateless:
# there is no database. Documents are processed in memory and never persisted.
#
# On Coolify: point the app at this compose file. Coolify injects the
# environment variables defined in its UI; the defaults below are for local
# development via `docker compose up --build`.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clarityai-backend
    restart: unless-stopped
    environment:
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-google/gemma-3n-e4b-it}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    container_name: clarityai-frontend
    restart: unless-stopped
    environment:
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    depends_on:
      - backend
    expose:
      - "3000"
    networks:
      - default   # stays on the compose project network to reach the backend
      - coolify   # joins Coolify's proxy network so Traefik can route to it

networks:
  coolify:
    external: true  # Coolify's pre-existing proxy network (confirmed name)
