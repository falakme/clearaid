# ClarityAI — Coolify-compatible stack
# Runs the Next.js frontend and the FastAPI backend. ClarityAI is stateless:
# there is no database. Documents are processed in memory and never persisted.
#
# On Coolify: point the app at this compose file. Coolify injects the
# environment variables defined in its UI; the defaults below are for local
# development via `docker compose up --build`.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clarityai-backend
    restart: unless-stopped
    environment:
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-google/gemma-3n-e4b-it}
      # Comma-separated list of allowed CORS origins for the browser app.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # Brave Search — powers the agentic "Verified Local Support" engine.
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the browser bundle at build time. Empty = call the
        # frontend's own origin (/api/*), which proxies to the backend over
        # the internal network. Recommended for Coolify (no CORS / mixed
        # content). Only set this to a full https URL if you want the browser
        # to hit the backend directly.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    container_name: clarityai-frontend
    restart: unless-stopped
    environment:
      # Internal URL the Next.js server uses to reach the backend container.
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    depends_on:
      # Wait for the backend to pass its healthcheck before starting, so the
      # first proxied request can't race a not-yet-ready backend.
      backend:
        condition: service_healthy
    expose:
      - "3000"
