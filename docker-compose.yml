# ClarityAI — Coolify-compatible stack
# Runs the Next.js frontend and the FastAPI backend. ClarityAI is stateless:
# there is no database. Documents are processed in memory and never persisted.
#
# On Coolify: point the app at this compose file. Coolify injects the
# environment variables defined in its UI; the defaults below are for local
# development via `docker compose up --build`.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clarityai-backend
    restart: unless-stopped
    environment:
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-google/gemma-3n-e4b-it}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    container_name: clarityai-frontend
    restart: unless-stopped
    environment:
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      # Keep-alive timeout must exceed Traefik's default (90s) so Node.js
      # doesn't close connections that Traefik is still holding open.
      # Without this, force-refresh triggers a 504 because Traefik tries to
      # reuse a connection that Node.js has already silently dropped.
      KEEP_ALIVE_TIMEOUT: ${KEEP_ALIVE_TIMEOUT:-100000}
    depends_on:
      - backend
    expose:
      - "3000"
    # Traefik (Coolify's proxy) only lives on the `coolify` network. Because
    # this container is ALSO on the `default` network (to reach the backend by
    # name), Docker hands Traefik two IPs for it and Traefik picks one
    # non-deterministically / round-robin. Whenever it picks the `default`-net
    # IP it can't reach the container, so the request hangs until the proxy's
    # dial timeout and returns a 504 — which looks like "the homepage randomly
    # doesn't load". Pinning the routing network removes the ambiguity.
    labels:
      - traefik.docker.network=coolify
    healthcheck:
      # Lets the orchestrator/proxy avoid routing to a not-yet-ready container.
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - default   # stays on the compose project network to reach the backend
      - coolify   # joins Coolify's proxy network so Traefik can route to it

networks:
  coolify:
    external: true  # Coolify's pre-existing proxy network (confirmed name)
