# ClearAid — Unified Coolify-compatible stack
# Runs the Next.js frontend, FastAPI backend, and Postgres DB.
#
# On Coolify: point the app at this compose file. Coolify injects the
# environment variables defined in its UI; the defaults below are for
# local development via `docker compose up --build`.

services:
  db:
    image: postgres:16-alpine
    container_name: clearaid-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clearaid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clearaid_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-clearaid}
    volumes:
      - clearaid_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clearaid} -d ${POSTGRES_DB:-clearaid}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not exposed publicly in production; only the backend talks to it.
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clearaid-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-clearaid}:${POSTGRES_PASSWORD:-clearaid_dev_pw}@db:5432/${POSTGRES_DB:-clearaid}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-google/gemma-3n-e4b-it}
      # Comma-separated list of allowed CORS origins for the browser app.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-clearaid_admin_dev_key}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked in at build time for the browser bundle.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    container_name: clearaid-frontend
    restart: unless-stopped
    environment:
      # Used by Next.js server-side admin proxy routes.
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-clearaid_admin_dev_key}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      # Optional Clerk auth (leave empty to disable auth gating).
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  clearaid_pgdata:
